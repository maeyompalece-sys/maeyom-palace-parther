name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'js/**'
      - 'icon-*.png'
      - 'ic_launcher_*.png'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Init npm and install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.maeyom.partner",
            "appName": "Maeyom Partner",
            "webDir": "www",
            "server": {
              "url": "https://maeyompalece-sys.github.io/maeyom-partner-app/",
              "cleartext": false
            }
          }
          CAPEOF

      - name: Build web assets
        run: |
          mkdir -p www/js
          cp index.html www/
          cp js/config.js www/js/
          cp js/api.js www/js/
          cp js/partner-app.js www/js/
          cp js/partner-menu.js www/js/

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set app icon
        run: |
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml

          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp ic_launcher_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp ic_launcher_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp ic_launcher_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp ic_launcher_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          find android/app/src/main/res -name "launch_background.xml" | xargs -I{} sed -i 's/#ffffff/#4A0E0E/g; s/#FFFFFF/#4A0E0E/g' {} 2>/dev/null || true

      - name: Add permissions to AndroidManifest
        run: |
          sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <uses-permission android:name="android.permission.VIBRATE" \/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n<\/manifest>/' android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin duplicate
        run: |
          cat >> android/app/build.gradle << 'GRADLEEOF'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0'
              }
          }
          GRADLEEOF

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maeyom-partner-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
