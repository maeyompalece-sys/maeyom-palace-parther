name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Init npm and install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/cli @capacitor/local-notifications @capacitor/app @capacitor-firebase/messaging

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.maeyom.partner",
            "appName": "Maeyom Partner",
            "webDir": "www",
            "server": {
              "url": "https://maeyompalece-sys.github.io/maeyom-palace-parther/",
              "cleartext": false
            },
            "plugins": {
              "LocalNotifications": {
                "smallIcon": "ic_stat_icon_config_sample",
                "iconColor": "#651713"
              },
              "PushNotifications": {
                "presentationOptions": ["badge", "sound", "alert"]
              }
            }
          }
          CAPEOF

      - name: Build web assets
        run: |
          mkdir -p www/js
          cp maeyom-partner-repo/maeyom-partner-repo/index.html www/
          cp maeyom-partner-repo/maeyom-partner-repo/js/config.js www/js/
          cp maeyom-partner-repo/maeyom-partner-repo/js/api.js www/js/
          cp maeyom-partner-repo/maeyom-partner-repo/js/partner-app.js www/js/
          cp maeyom-partner-repo/maeyom-partner-repo/js/partner-menu.js www/js/
          cp maeyom-partner-repo/maeyom-partner-repo/js/partner-settings.js www/js/

      - name: Add Android platform
        run: npx cap add android

      - name: Add google-services.json
        run: |
          cat > android/app/google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "712092316084",
              "project_id": "maeyom-5312d",
              "storage_bucket": "maeyom-5312d.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:712092316084:android:ed0d22e71ca59661c1c2e1",
                  "android_client_info": {
                    "package_name": "com.maeyom.partner"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyB92Hzwx05HaqY62MBa5sE15jthegjoYTE"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSEOF

      - name: Add Firebase & FCM to build.gradle
        run: |
          # Project-level build.gradle
          cat >> android/build.gradle << 'GRADLEEOF'

          buildscript {
              dependencies {
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          GRADLEEOF

          # App-level build.gradle
          cat >> android/app/build.gradle << 'GRADLEEOF'

          apply plugin: 'com.google.gms.google-services'

          dependencies {
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-messaging'
          }

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0'
              }
          }
          GRADLEEOF

      - name: Capacitor sync
        run: npx cap sync android

      - name: Register plugins and fix notification tap handling in MainActivity
        run: |
          MAIN_ACTIVITY=$(find android/app/src/main/java -name "MainActivity.java" | head -1)

          # เพิ่ม import ที่จำเป็น
          sed -i 's/import com.getcapacitor.BridgeActivity;/import com.getcapacitor.BridgeActivity;\nimport com.capacitorjs.plugins.localnotifications.LocalNotificationsPlugin;\nimport android.content.Intent;\nimport android.os.Bundle;/' "$MAIN_ACTIVITY"

          # registerPlugin ต้องอยู่ "หลัง" super.onCreate() เพราะ Capacitor bridge
          # ถูกสร้างใน super.onCreate() — เรียกก่อนหน้านั้นจะทำให้ plugin
          # ไม่ผูกกับ bridge ที่ถูกต้อง โดยเฉพาะตอน cold-start จากการแตะ notification
          # ขณะแอปถูก kill ไปจาก background แล้ว
          #
          # เพิ่ม onNewIntent() ด้วย — จำเป็นสำหรับกรณีแอปยังมีชีวิตอยู่ใน background
          # (ไม่ถูก kill) แล้วผู้ใช้แตะ notification ซ้ำ Android จะส่ง Intent ใหม่
          # เข้ามาทาง onNewIntent() แทนที่จะสร้าง Activity ใหม่ ถ้าไม่ override
          # ตรงนี้ WebView จะไม่ได้รับรู้ event ใดๆ เลยจากการแตะ
          sed -i 's/public class MainActivity extends BridgeActivity {/public class MainActivity extends BridgeActivity {\n  @Override\n  public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    registerPlugin(LocalNotificationsPlugin.class);\n  }\n\n  @Override\n  public void onNewIntent(Intent intent) {\n    super.onNewIntent(intent);\n    setIntent(intent);\n  }\n\n  @Override\n  public void onResume() {\n    super.onResume();\n    if (this.bridge != null \&\& this.bridge.getWebView() != null) {\n      this.bridge.getWebView().post(new Runnable() {\n        @Override\n        public void run() {\n          if (bridge.getWebView() != null) {\n            bridge.getWebView().evaluateJavascript(\n              "window.dispatchEvent(new Event(\\\"maeyomAppResumed\\\"));", null);\n          }\n        }\n      });\n    }\n  }/' "$MAIN_ACTIVITY"

      - name: Set launchMode singleTask in AndroidManifest (only if not already present)
        run: |
          # singleTask ป้องกันไม่ให้ Android สร้าง Activity ใหม่ซ้อนทับเวลาแตะ
          # notification ขณะแอปเปิดอยู่แล้วใน background — ถ้าไม่ตั้งตรงนี้
          # ระบบอาจ "เปิดแอปขึ้นมา" แต่จริงๆ คือสร้าง instance ใหม่ที่ว่างเปล่า
          # ไม่ใช่ instance เดิมที่ login ค้างอยู่ ทำให้ดูเหมือน "กดแล้วไม่เข้า"
          #
          # ⚠️ Capacitor บางเวอร์ชัน generate AndroidManifest.xml ที่มี
          # android:launchMode="singleTask" ติดมาเป็นค่า default อยู่แล้ว
          # ต้องเช็คก่อนเสมอ ไม่งั้นจะได้ attribute ซ้ำกัน 2 ครั้งในแท็กเดียว
          # ซึ่งทำให้ processDebugManifest ล้มเหลวทันที (invalid XML)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q 'android:launchMode=' "$MANIFEST"; then
            echo "✅ launchMode มีอยู่แล้วใน AndroidManifest.xml — ข้ามขั้นตอนนี้"
          else
            sed -i 's/android:name=".MainActivity"/android:name=".MainActivity"\n            android:launchMode="singleTask"/' "$MANIFEST"
            echo "✅ เพิ่ม launchMode=\"singleTask\" แล้ว"
          fi

      - name: Set app icon
        run: |
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml

          cp maeyom-partner-repo/maeyom-partner-repo/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp maeyom-partner-repo/maeyom-partner-repo/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_hdpi.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp maeyom-partner-repo/maeyom-partner-repo/ic_launcher_mdpi.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png

          find android/app/src/main/res -name "launch_background.xml" | xargs -I{} sed -i 's/#ffffff/#4A0E0E/g; s/#FFFFFF/#4A0E0E/g' {} 2>/dev/null || true

      - name: Add permissions to AndroidManifest
        run: |
          sed -i 's/<\/manifest>/    <uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" \/>\n    <uses-permission android:name="android.permission.VIBRATE" \/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" \/>\n<\/manifest>/' android/app/src/main/AndroidManifest.xml

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: maeyom-partner-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
