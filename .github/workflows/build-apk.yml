name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Init npm and install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.maeyom.partner",
            "appName": "Maeyom Partner",
            "webDir": "www",
            "server": {
              "url": "https://maeyompalece-sys.github.io/maeyom-palace-parther/",
              "cleartext": false
            }
          }
          CAPEOF

      - name: Build web assets
        run: |
          echo "=== ดู structure ทั้งหมด ==="
          find . -type f | head -50
          mkdir -p www/js
          cp maeyom-partner-repo/index.html www/
          cp maeyom-partner-repo/js/config.js www/js/
          cp maeyom-partner-repo/js/api.js www/js/
          cp maeyom-partner-repo/js/partner-app.js www/js/
          cp maeyom-partner-repo/js/partner-menu.js www/js/

      - name: Add Android platform
        run: npx cap add android

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set app icon
        run: |
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml

          cp maeyom-partner-repo/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp maeyom-partner-repo/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          cp maeyom-partner-repo/ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp maeyom-partner-repo/ic_launcher_xxhdpi.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp maeyom-partner-repo/ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp maeyom-partner-repo/ic_launcher_xhdpi.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp maeyom-partner-repo/ic_launcher_hdpi.png
